name: Daily Order Report

on:
  schedule:
    # KST 08:30 = UTC 23:30 (전날)
    - cron: "30 23 * * *"
    # KST 12:30 = UTC 03:30
    - cron: "30 3 * * *"
    # KST 18:00 = UTC 09:00
    - cron: "0 9 * * *"
  workflow_dispatch:
    inputs:
      slot:
        description: "Manual run slot"
        required: true
        default: "test"
        type: choice
        options: [morning, midday, evening, test]

jobs:
  send-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine slot
        id: slot
        run: |
          # cron 시각으로 slot 자동 매핑
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "slot=${{ inputs.slot }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(date -u +%H)
            MIN=$(date -u +%M)
            if [ "$HOUR" = "23" ]; then
              echo "slot=morning" >> $GITHUB_OUTPUT
            elif [ "$HOUR" = "03" ]; then
              echo "slot=midday" >> $GITHUB_OUTPUT
            else
              echo "slot=evening" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Run report
        env:
          CAFE24_MALL_ID: ${{ secrets.CAFE24_MALL_ID }}
          CAFE24_CLIENT_ID: ${{ secrets.CAFE24_CLIENT_ID }}
          CAFE24_CLIENT_SECRET: ${{ secrets.CAFE24_CLIENT_SECRET }}
          CAFE24_REFRESH_TOKEN: ${{ secrets.CAFE24_REFRESH_TOKEN }}
          NAVER_COMMERCE_CLIENT_ID: ${{ secrets.NAVER_COMMERCE_CLIENT_ID }}
          NAVER_COMMERCE_CLIENT_SECRET: ${{ secrets.NAVER_COMMERCE_CLIENT_SECRET }}
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
          TZ: Asia/Seoul
        run: python src/main.py --slot=${{ steps.slot.outputs.slot }}
